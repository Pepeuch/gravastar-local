<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline Mirror</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, #20414d 0%, #10171b 55%, #080b0d 100%);
        color: #e8f8ff;
        font: 16px/1.5 "Segoe UI", sans-serif;
        text-align: center;
      }

      main {
        width: min(32rem, calc(100vw - 2rem));
        padding: 1.5rem;
        border: 1px solid rgba(140, 216, 255, 0.22);
        border-radius: 1rem;
        background: rgba(10, 18, 22, 0.82);
        box-shadow: 0 1rem 3rem rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.05rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      p {
        margin: 0;
        color: #c2dbe5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Offline Mirror</h1>
      <p>Embedded tutorials and external device-specific routes are disabled in the local offline build.</p>
    </main>
  </body>
</html>
