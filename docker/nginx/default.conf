server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Frame-Options "DENY" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; media-src 'self' blob:; connect-src 'self' http://localhost:15371 ws://localhost:15371 http://127.0.0.1:15371 ws://127.0.0.1:15371 blob:; frame-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;

    location = / {
        return 302 /gravastar/connect;
    }

    location = /gravastar {
        return 302 /gravastar/connect;
    }

    location = /gravastar/ {
        return 302 /gravastar/connect;
    }

    location /gravastar/assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    location /gravastar/ {
        try_files $uri $uri/ /gravastar/index.html;
    }

    location / {
        try_files $uri =404;
    }
}
