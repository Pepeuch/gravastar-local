services:
  gravastar:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    init: true
    ports:
      - "127.0.0.1:${GRAVASTAR_PORT:-18088}:80"
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/gravastar/connect || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
